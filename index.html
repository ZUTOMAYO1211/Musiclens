<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicLens · 뮤직렌즈</title>
<style>
:root{
  --bg-base:#000000; 
  --bg-surface:#0a0a0a; 
  --bg-elevated:#121212; 
  --bg-card:#181818;
  --text-primary:#ffffff; --text-secondary:#8a8a8a; --text-muted:#555555;
  --accent:#ffffff; --accent-dark:#262626; --accent-cyan:#e5e5e5;
  --accent-gradient:linear-gradient(135deg, #ffffff, #8a8a8a);
  --color-error:#ffffff; --color-warning:#8a8a8a; --color-info:#555555;
  --border-subtle:#262626; --border-muted:#141414;
  --shadow-heavy:none;
  --shadow-medium:none;
  --shadow-glow:none;
  --radius-sm:0px; --radius-md:0px; --radius-lg:0px;
  --radius-pill:0px; --radius-circle:0px;
  --font-ui:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  --font-mono:SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace;
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px;
  --header-h:72px; --vibe-drawer-w:400px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:var(--font-ui); background:var(--bg-base); color:var(--text-primary);
  -webkit-font-smoothing:antialiased; overflow:hidden;
  position:relative;
}
/* Ambient background hidden */
.ambient-bg{display:none;}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#262626;border-radius:0px;}
::-webkit-scrollbar-thumb:hover{background:#404040;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;}

/* ---------- Layout ---------- */
.app-container{
  display:flex; flex-direction:column; height:100vh; position:relative; z-index:1;
}
@media(min-width:769px){
  .app-container{
    transition: padding-right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .app-container.vibe-open{
    padding-right: var(--vibe-drawer-w);
  }
}
.global-header{
  height:var(--header-h); display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--space-6); background:rgba(0, 0, 0, 0.8); backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border-subtle);
  position:sticky; top:0; z-index:40; transition:background .2s;
}
.global-header.scrolled{background:#000000;}
.header-left{display:flex; align-items:center; gap:var(--space-6);}
.header-right{display:flex; align-items:center; gap:var(--space-4);}

.nav-logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-mono);font-weight:700;font-size:18px;letter-spacing:1px;}
.nav-logo .logo-mark{color:#ffffff;display:grid;place-items:center;}
.topbar-nav{display:flex;gap:var(--space-2);}
.topbar-nav button{
  width:32px;height:32px;border-radius:0px;font-family:var(--font-mono);
  background:#0a0a0a; display:grid;place-items:center;color:var(--text-secondary);
  border:1px solid var(--border-subtle); transition:background .15s, color .15s;
}
.topbar-nav button:hover{color:#fff; background:#161616; border-color:#8a8a8a;}

.header-nav{display:flex; gap:var(--space-1); align-items:center;}
.header-nav .nav-link{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  border-radius:0px;color:var(--text-secondary);font-family:var(--font-mono);font-weight:600;font-size:12px;
  transition:color .15s,background .15s, border-color .15s;
  border:1px solid transparent;
}
.header-nav .nav-link:hover{color:#fff; background:#161616; border-color:#262626;}
.header-nav .nav-link.active{
  color:#fff; background:#222222; border-color:#ffffff;
}
.header-nav .nav-link.active .nav-ic{color:#ffffff;}
.nav-ic{display:grid;place-items:center;width:18px;height:18px;flex-shrink:0;}

.main-content{
  flex:1; overflow-y:auto; position:relative;
}
.main-inner{padding:var(--space-6) var(--space-6) 80px;max-width:1300px;margin:0 auto;}

.lang-toggle{display:flex;background:#0d0d0d;border-radius:0px;padding:0px;border:1px solid var(--border-subtle);}
.lang-toggle button{
  padding:6px 12px;border-radius:0px;font-family:var(--font-mono);font-size:11px;font-weight:700;
  letter-spacing:1px;color:var(--text-secondary);text-transform:uppercase; transition:background .15s, color .15s;
}
.lang-toggle button.active{background:#ffffff;color:#000000;}

/* ---------- Buttons ---------- */
.btn-primary{
  background:#ffffff;color:#000000;font-family:var(--font-mono);font-weight:700;font-size:12px;
  padding:12px 28px;border-radius:0px;letter-spacing:1px;text-transform:uppercase;
  transition:background .15s, color .15s; display:inline-block; border:1px solid #ffffff; text-align:center;
}
.btn-primary:hover{background:#000000;color:#ffffff;border-color:#ffffff;}
.btn-secondary{
  background:#0a0a0a;color:#ffffff;font-family:var(--font-mono);font-weight:700;font-size:11px;
  padding:9px 18px;border-radius:0px;letter-spacing:0.8px;text-transform:uppercase;
  transition:background .15s, border-color .15s; border:1px solid var(--border-subtle);
}
.btn-secondary:hover{background:#161616;border-color:#ffffff;}
.btn-outlined{
  border:1px solid var(--border-subtle);color:var(--text-secondary);font-family:var(--font-mono);font-weight:600;font-size:11px;
  padding:7px 16px;border-radius:0px;transition:border-color .15s,color .15s,background .15s;
}
.btn-outlined:hover{border-color:#fff;color:#fff;background:#111111;}
.btn-outlined.active{border-color:#ffffff;color:#ffffff;background:#1a1a1a;}

.btn-play{
  width:44px;height:44px;border-radius:0px;background:#ffffff;
  color:#000000;display:grid;place-items:center;transition:background .15s, color .15s;
  border:1px solid #ffffff;
}
.btn-play:hover{background:#000000;color:#ffffff;}
.btn-play.sm{width:32px;height:32px;}
.btn-play.sm svg{width:14px;height:14px;}
.btn-icon{width:36px;height:36px;border-radius:0px;display:grid;place-items:center;color:var(--text-secondary);transition:color .15s,background .15s; border:1px solid transparent;}
.btn-icon:hover{color:#fff;background:#111111;border-color:var(--border-subtle);}

/* ---------- Sections ---------- */
.section{margin-bottom:var(--space-8);}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:var(--space-4);}
.section-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.section-subtitle{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:4px;}
.see-all{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);transition:color .15s;}
.see-all:hover{color:#ffffff;text-decoration:underline;}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-5);}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-5);}
.horizontal-scroll{display:flex;gap:var(--space-4);overflow-x:auto;padding-bottom:var(--space-3);scroll-snap-type:x proximity;}
.horizontal-scroll>*{scroll-snap-align:start;}

/* ---------- Hero ---------- */
.hero{
  position:relative;border-radius:0px;overflow:hidden;padding:48px var(--space-6);
  margin-bottom:var(--space-6); isolation:isolate;
  background:#0a0a0a; border:1px solid var(--border-subtle);
}
.hero-bg{display:none;}
.hero h1{font-size:clamp(28px,4.5vw,46px);font-weight:700;line-height:1.1;letter-spacing:-1.5px;max-width:640px;}
.hero p{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);margin:var(--space-3) 0 var(--space-5);max-width:480px;line-height:1.5;letter-spacing:-0.2px;}

/* ---------- Genre Card ---------- */
.genre-card{
  position:relative;border-radius:0px;overflow:hidden;padding:var(--space-4) var(--space-5);
  min-height:180px;display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;transition:border-color .2s, background-color .2s;
  border:1px solid var(--border-subtle);
  background:#0a0a0a !important;
}
.genre-card::after{display:none;}
.genre-card>*{position:relative;z-index:1;}
.genre-card:hover{border-color:#ffffff;background:#111111 !important;}
.genre-card .gc-emoji{font-family:var(--font-mono);font-size:24px;color:#ffffff;}
.genre-card .gc-name{font-size:20px;font-weight:700;}
.genre-card .gc-name small{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text-secondary);display:block;margin-top:2px;}
.genre-card .gc-sub{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--text-secondary);line-height:1.5;min-height:33px;margin-top:8px;}
.genre-card .gc-foot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);margin-top:auto;}
.listeners-bar{flex:1;}
.listeners-bar .lb-track{height:4px;border-radius:0px;background:#1a1a1a;overflow:hidden;margin-bottom:4px;}
.listeners-bar .lb-fill{height:100%;background:#ffffff;border-radius:0px;}
.listeners-bar .lb-label{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text-secondary);}
.gc-go{background:#161616;border:1px solid var(--border-subtle);color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:6px 12px;border-radius:0px;white-space:nowrap; transition:background .15s, border-color .15s;}
.gc-go:hover{background:#262626;border-color:#ffffff;}
.gc-artists{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);line-height:1.5;}

/* ---------- Song Card (Explorer/Taste Style) ---------- */
.song-card{
  width:165px;flex-shrink:0;background:#0a0a0a;border-radius:0px;
  padding:var(--space-3);transition:background .2s, border-color .2s;cursor:pointer;position:relative;
  border:1px solid var(--border-subtle);
}
.song-card:hover{background:#111111;border-color:#ffffff;}
.song-card:hover .sc-play{opacity:1;transform:translateY(0);}
.art-thumb{
  width:100%;aspect-ratio:1;border-radius:0px;margin-bottom:var(--space-2);
  position:relative;overflow:hidden;display:grid;place-items:center;font-size:24px;
  border:1px solid var(--border-subtle);
}
.sc-play{
  position:absolute;bottom:8px;right:8px;opacity:0;transform:translateY(0);
  transition:opacity .2s;z-index:2;
}
.song-card .sc-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-card .sc-artist{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-card .sc-meta{display:flex;align-items:center;gap:var(--space-1);margin-top:var(--space-2);}

/* ---------- Tags ---------- */
.genre-tag{
  display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:0px;letter-spacing:.3px;
  background:#141414;color:#fff;white-space:nowrap;
  border:1px solid var(--border-subtle);
}
.genre-tag .gt-dot{width:4px;height:4px;border-radius:0px;background:#ffffff;}
.era-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:0px;background:#111111;letter-spacing:.3px; border:1px solid var(--border-subtle);}
.pill-tag{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:11px;font-weight:600;padding:6px 14px;border-radius:0px;background:#0d0d0d;color:var(--text-secondary);white-space:nowrap;transition:background .15s,color .15s,border-color .15s;cursor:pointer; border:1px solid var(--border-subtle);}
.pill-tag:hover{background:#1c1c1c;color:#fff; border-color:#ffffff;}

/* ---------- Editorial Rank Charts ---------- */
.chart-head{display:grid;grid-template-columns:36px 1fr 100px 70px 80px 48px;gap:var(--space-3);padding:0 var(--space-3) var(--space-3);border-bottom:1px solid var(--border-subtle);font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);align-items:center;}
.chart-row{
  display:grid;grid-template-columns:36px 1fr 100px 70px 80px 48px;gap:var(--space-3);
  padding:var(--space-3);border-radius:0px;align-items:center;
  background:#050505; border:1px solid var(--border-subtle); margin-bottom:8px;
  transition:background .15s ease, border-color .15s;cursor:pointer;
}
.chart-head.gd,.chart-row.gd{grid-template-columns:36px 1fr 64px 84px 56px;}
.chart-row:hover{background:#111111; border-color:#ffffff;}
.cr-rankcell{position:relative;display:grid;place-items:center;height:36px;}
.cr-rank{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--text-muted);}
.cr-playbtn{position:absolute;inset:0;margin:auto;opacity:0;pointer-events:none;}
.chart-row:hover .cr-rank{opacity:0;}
.chart-row:hover .cr-playbtn{opacity:1;pointer-events:auto;}
.cr-song{display:flex;align-items:center;gap:var(--space-3);min-width:0;}
.cr-song .art-thumb{width:40px;height:40px;margin:0;font-size:14px;flex-shrink:0;border-radius:0px;}
.cr-song .cr-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-song .cr-artist{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-num{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);text-align:right;}
.rank-change{font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:700;}
.rc-up{color:#ffffff;} .rc-down{color:#8a8a8a;} .rc-same{color:var(--text-muted);}
.rc-new{background:#ffffff;color:#000000;font-family:var(--font-mono);font-size:8px;padding:2px 5px;border-radius:0px;letter-spacing:.3px; font-weight:700;}

/* ---------- filter bar ---------- */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-5);}

/* ---------- Genre detail ---------- */
.genre-hero{
  position:relative;border-radius:0px;overflow:hidden;padding:48px var(--space-6) var(--space-5);
  min-height:280px;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:var(--space-6);
  border:1px solid var(--border-subtle);
  background:#0a0a0a !important;
}
.genre-hero::after{display:none;}
.genre-hero>*{position:relative;z-index:1;}
.genre-hero .gh-emoji{font-family:var(--font-mono);font-size:48px;margin-bottom:var(--space-2);color:#ffffff;}
.genre-hero h1{font-size:clamp(32px,5.5vw,56px);font-weight:700;letter-spacing:-1.5px;}
.genre-hero .gh-desc{font-size:14px;color:var(--text-secondary);max-width:600px;margin-top:var(--space-3);line-height:1.6;}
.char-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:var(--space-4);}

.artist-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--space-4);}
.artist-cell{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);text-align:center;}
.artist-avatar{width:90px;height:90px;border-radius:0px;display:grid;place-items:center;font-family:var(--font-mono);font-size:24px;font-weight:700;color:#fff;border:1px solid var(--border-subtle);}
.artist-cell .an{font-size:13px;font-weight:600;color:var(--text-primary);}

.related-card{background:#0a0a0a;border-radius:0px;padding:var(--space-3);display:flex;align-items:center;gap:var(--space-3);cursor:pointer;transition:background .2s, border-color .2s; border:1px solid var(--border-subtle);}
.related-card:hover{background:#111111; border-color:#ffffff;}
.related-card .rc-art{width:48px;height:48px;border-radius:0px;flex-shrink:0;border:1px solid var(--border-subtle);}
.related-card .rc-name{font-size:14px;font-weight:700;}
.related-card .rc-name small{font-family:var(--font-mono);display:block;font-size:11px;color:var(--text-secondary);font-weight:600;margin-top:2px;}

/* ---------- Live Share Visualizer Widget ---------- */
.share-widget{
  background:#0a0a0a; border:1px solid var(--border-subtle); border-radius:0px;
  padding:var(--space-4); margin-bottom:var(--space-6); display:flex; flex-direction:column; gap:var(--space-3);
}
.sw-head{display:flex; justify-content:space-between; align-items:center;}
.sw-title{font-family:var(--font-mono);font-size:12px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-primary); display:flex; align-items:center; gap:8px;}
.sw-pulsing-dot{width:6px; height:6px; background:#ffffff; border-radius:0px; animation:pulseGlow 2s infinite;}
@keyframes pulseGlow{0%,100%{opacity:0.3;}50%{opacity:1;}}
.sw-bars{display:flex; flex-direction:column; gap:8px;}
.sw-bar-row{display:flex; align-items:center; gap:var(--space-3); font-family:var(--font-mono);font-size:11px; font-weight:700;}
.sw-bar-label{width:90px; text-align:left;}
.sw-bar-track{flex:1; height:6px; background:#161616; border-radius:0px; overflow:hidden;}
.sw-bar-fill{height:100%; border-radius:0px; transition:width 1s cubic-bezier(0.16, 1, 0.3, 1);}
.sw-bar-val{width:45px; text-align:right; color:var(--text-secondary);}

/* ---------- Timeline Flow & Lineage ---------- */
.timeline{display:flex;flex-direction:column;gap:var(--space-6);padding:var(--space-4) 0; position:relative; max-width:680px; margin:0 auto;}
.era-card{
  width:100%; flex-shrink:0;border-radius:0px;overflow:hidden;
  cursor:pointer;transition:border-color .2s;position:relative;
  border:1px solid var(--border-subtle); background:#0a0a0a;
}
.era-card:hover{border-color:#ffffff;}
.era-card .ec-top{padding:var(--space-5);min-height:140px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;}
.era-card .ec-top::after{display:none;}
.era-card .ec-top>*{position:relative;z-index:1;}
.era-card .ec-decade{font-family:var(--font-mono);font-size:32px;font-weight:700;letter-spacing:-1.5px;text-shadow:0 2px 4px rgba(0,0,0,0.6);}
.era-card .ec-title{font-size:13px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.6);}
.era-card .ec-body{background:#0d0d0d;padding:0;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;}
.era-card.open .ec-body{max-height:600px;padding:var(--space-4);border-top:1px solid var(--border-subtle);}
.era-card .ec-body p{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:var(--space-3);}
.ec-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-2);}
.ec-genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--space-3);}
.ec-context{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);border-top:1px solid var(--border-muted);padding-top:var(--space-2);margin-top:var(--space-2);}

/* ---------- Search ---------- */
.search-box{position:relative;max-width:560px;margin-bottom:var(--space-5);}
.search-box svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
.search-input{
  width:100%;padding:14px 20px 14px 50px;border-radius:0px;
  background:#0a0a0a;color:#fff;font-family:var(--font-mono);font-size:13px;font-weight:500;
  border:1px solid var(--border-subtle); transition:border-color .15s, background .15s;
}
.search-input:focus{outline:none; border-color:#ffffff; background:#111111;}
.search-input::placeholder{color:var(--text-muted);}
.ai-suggest{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--space-5);}
.ai-result{background:#0a0a0a;border-radius:0px;padding:var(--space-4);margin-bottom:var(--space-5);border-left:3px solid #ffffff; border-top:1px solid var(--border-subtle); border-right:1px solid var(--border-subtle); border-bottom:1px solid var(--border-subtle);}
.ai-result .ai-q{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:var(--space-2);font-weight:700;}
.ai-result .ai-a{font-size:13px;line-height:1.6;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);font-family:var(--font-mono);font-size:12px;}
.empty-state .es-emoji{font-size:32px;margin-bottom:var(--space-3);opacity:0.5;}

/* ---------- Taste DNA Profiler UI ---------- */
.taste-container{max-width:760px; margin:0 auto; background:#0a0a0a; border:1px solid var(--border-subtle); border-radius:0px; padding:var(--space-6); position:relative;}
.taste-step{display:flex; flex-direction:column; gap:var(--space-4); animation:fadeIn 0.3s ease;}
.taste-step-title{font-size:18px; font-weight:700; color:#fff;}
.taste-step-desc{font-size:13px; color:var(--text-secondary); margin-bottom:var(--space-2);}
.taste-grid-toggle{display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;}
@media(max-width:520px){.taste-grid-toggle{grid-template-columns:repeat(2,1fr);}}
.taste-option-btn{
  padding:12px; border-radius:0px; background:#0d0d0d;
  border:1px solid var(--border-subtle); transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; font-family:var(--font-mono); font-size:12px; font-weight:600;
}
.taste-option-btn:hover{background:#161616; border-color:#8a8a8a;}
.taste-option-btn.selected{
  background:#ffffff; border-color:#ffffff; color:#000000;
}
.taste-progress{display:flex; justify-content:space-between; align-items:center; margin-top:var(--space-6); border-top:1px solid var(--border-subtle); padding-top:var(--space-4);}
.taste-progress-dots{display:flex; gap:8px;}
.tpd-dot{width:6px; height:6px; border-radius:0px; background:#222;}
.tpd-dot.active{background:#ffffff;}

/* Taste DNA Result Layout */
.td-result{animation:fadeIn 0.5s ease;}
.td-badge{display:inline-block; font-family:var(--font-mono); font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; background:#ffffff; color:#000000; padding:4px 10px; border-radius:0px; margin-bottom:8px;}
.td-dna-name{font-size:26px; font-weight:800; color:#fff; margin-bottom:12px; letter-spacing:-1px;}
.td-dna-desc{font-size:14px; color:var(--text-secondary); line-height:1.6; margin-bottom:var(--space-5);}
.td-visual-row{display:grid; grid-template-columns:1.2fr 1fr; gap:var(--space-6); margin-bottom:var(--space-6);}
@media(max-width:680px){.td-visual-row{grid-template-columns:1fr;}}
.td-chart{background:#050505; border:1px solid var(--border-subtle); border-radius:0px; padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-3);}
.td-chart-item{display:flex; flex-direction:column; gap:4px;}
.td-chart-label{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-secondary);}
.td-chart-bar{height:6px; background:#161616; border-radius:0px; overflow:hidden;}
.td-chart-fill{height:100%; border-radius:0px; background:#ffffff; transition:width 1s ease;}

/* ---------- Vibe Analyzer Drawer Panel ---------- */
.vibe-analyzer {
  position: fixed; top: 0; right: -420px; width: var(--vibe-drawer-w); height: 100vh;
  background: #080808;
  border-left: 1px solid var(--border-subtle);
  z-index: 100; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column; overflow-y: auto; color: #fff;
}
.vibe-analyzer.open { right: 0; }
.va-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--space-4) var(--space-5); border-bottom:1px solid var(--border-subtle);
}
.va-head h2{font-family:var(--font-mono); font-size:13px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text-secondary);}
.va-close{
  width:28px; height:28px; border-radius:0px; background:#111;
  display:grid; place-items:center; color:var(--text-secondary); transition:background .15s, color .15s;
  border:1px solid var(--border-subtle);
}
.va-close:hover{background:#222; color:#fff;}
.va-body{
  flex:1; overflow-y:auto; padding:var(--space-5); display:flex; flex-direction:column; gap:var(--space-5);
}
.va-song-show{display:flex; flex-direction:column; align-items:center; text-align:center;}
.va-art-wrap{
  width:160px; height:160px; border-radius:0px; margin-bottom:var(--space-4);
  position:relative;
  display:grid; place-items:center; font-size:48px; border:1px solid var(--border-subtle);
}
.va-wave-glow{display:none;}
.va-title{font-size:18px; font-weight:800; color:#fff; margin-bottom:4px; line-height:1.2; letter-spacing:-0.5px;}
.va-artist{font-family:var(--font-mono); font-size:13px; color:var(--text-secondary); margin-bottom:var(--space-2);}

/* Sleek Vibe Waveform & Player Inside Analyzer */
.va-player-ctrl{
  display:flex; flex-direction:column; align-items:center; gap:12px;
  background:#0d0d0d; border:1px solid var(--border-subtle); border-radius:0px;
  padding:var(--space-4); margin-bottom:4px;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
}
.vap-row{display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); width:100%;}
.vap-time{font-family:var(--font-mono); font-size:10.5px; color:var(--text-muted); font-variant-numeric:tabular-nums; width:35px; text-align:center;}
.va-wave-svg{flex:1; height:32px; fill:#1a1a1a; cursor:pointer;}
.va-bar{transition: height 0.08s ease, y 0.08s ease;}

.player-btns-row {
  display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; margin-top: 4px;
}
.player-btn {
  background: none; border: none; color: var(--text-secondary); cursor: pointer; display: grid; place-items: center;
  transition: color 0.15s, transform 0.15s; width: 28px; height: 28px; border-radius: 50%;
}
.player-btn:hover { color: #fff; transform: scale(1.08); }
.player-btn.active { color: #ffffff; filter: drop-shadow(0 0 4px rgba(255,255,255,0.6)); }
.player-btn.play-toggle {
  background: #fff; color: #000; width: 36px; height: 36px;
}
.player-btn.play-toggle:hover { background: #e0e0e0; color: #000; transform: scale(1.05); }

.vol-slider {
  -webkit-appearance: none; appearance: none; flex: 1; max-width: 120px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.1); outline: none; cursor: pointer; transition: background 0.15s;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 10px; height: 10px; border-radius: 50%;
  background: #fff; transition: background 0.15s, transform 0.15s;
}
.vol-slider::-webkit-slider-thumb:hover {
  background: #ffffff; transform: scale(1.2); box-shadow: 0 0 6px rgba(255,255,255,0.8);
}

.va-stats{
  display:flex; flex-direction:column; gap:12px;
  background:#0a0a0a; border:1px solid var(--border-subtle);
  padding:var(--space-4); border-radius:0px;
}
.va-stat-row{display:flex; flex-direction:column; gap:4px;}
.va-stat-lbl{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-muted);}
.va-stat-track{height:6px; background:#161616; border-radius:0px; overflow:hidden;}
.va-stat-fill{height:100%; border-radius:0px; background:#ffffff;}

.va-anal-text{
  font-size:12.5px; color:var(--text-secondary); line-height:1.6;
  background:#0a0a0a; border:1px solid var(--border-subtle);
  padding:var(--space-4); border-radius:0px; border-left:3px solid #ffffff;
}

/* ---------- Mobile Bottom Nav ---------- */
.mobile-nav{display:none;}

/* ---------- Responsive ---------- */
@media(max-width:768px){
  .global-header{padding:0 var(--space-4); height:60px;}
  .header-nav{display:none;}
  .header-left .topbar-nav{display:none;}
  .main-inner{padding:var(--space-4) var(--space-4) 100px;}
  .grid-3{grid-template-columns:repeat(2,1fr);gap:12px;}
  .grid-2{grid-template-columns:1fr;gap:12px;}
  .artist-grid{grid-template-columns:repeat(3,1fr);}
  .section-title{font-size:18px;}
  .hero{padding:24px var(--space-4); margin-bottom:var(--space-4);}
  .chart-head{grid-template-columns:32px 1fr 60px 40px;}
  .chart-row{grid-template-columns:32px 1fr 60px 40px; padding:10px; margin-bottom:6px;}
  .chart-head .ch-genre,.chart-head .ch-year,.cr-genre-col,.cr-year{display:none;}
  
  .vibe-analyzer {
    right: 0; bottom: -85vh; top: auto; width: 100%; height: 80vh;
    border-left: none; border-top: 1px solid var(--border-subtle);
    border-radius: 0px;
    transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .vibe-analyzer.open { bottom: 56px; }
  
  .mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;z-index:60;
    background:#000000;border-top:1px solid var(--border-subtle);
  }
  .mobile-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text-muted);}
  .mobile-nav a svg{width:18px;height:18px;}
  .mobile-nav a.active{color:#fff;}
  .mobile-nav a.active svg{color:#ffffff;}
  .artist-avatar{width:70px;height:70px;font-size:20px;}
  .timeline{gap:20px;}
}

/* ---------- view fade ---------- */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.view{animation:fadeIn .25s ease;}
@keyframes shimmer{0%,100%{opacity:.4;}50%{opacity:.8;}}
.skeleton{animation:shimmer 1.5s ease infinite;background:#1a1a1a;}

function fetchAndCacheAlbumArt(song, playImmediately = false) {
  if (albumArtCache[song.id] && audioPreviewCache[song.id]) {
    if (playImmediately) {
      playAudio(audioPreviewCache[song.id]);
    }
    return;
  }
  if (pendingArtRequests[song.id]) return;
  pendingArtRequests[song.id] = true;
  
  const query = encodeURIComponent(`${song.artist} ${song.title}`);
  fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`)
    .then(res => res.json())
    .then(data => {
      if (data.results && data.results.length > 0) {
        const result = data.results[0];
        const url = result.artworkUrl100.replace('100x100bb.jpg', '500x500bb.jpg');
        albumArtCache[song.id] = url;
        saveAlbumArtCache();
        updateArtworkElements(song.id, url);
        
        if (result.previewUrl) {
          audioPreviewCache[song.id] = result.previewUrl;
          localStorage.setItem('ml_audio_preview_cache', JSON.stringify(audioPreviewCache));
          if (playImmediately && npState.song && npState.song.id === song.id && npState.playing) {
            playAudio(result.previewUrl);
          }
        }
      }
    })
    .catch(err => console.error(`Failed to fetch album art/preview for ${song.title}:`, err))
    .finally(() => {
      delete pendingArtRequests[song.id];
    });
}

function updateArtworkElements(songId, url) {
  document.querySelectorAll(`.art-thumb[data-art-song-id="${songId}"]`).forEach(el => {
    el.style.backgroundImage = `url('${url}')`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
    const span = el.querySelector('span');
    if (span) span.style.display = 'none';
  });
  document.querySelectorAll(`.va-art-wrap[data-art-song-id="${songId}"]`).forEach(el => {
    el.style.backgroundImage = `url('${url}')`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
    const span = el.querySelector('span');
    if (span) span.style.display = 'none';
  });
}

function fmtListeners(n){
  if(n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
  if(n >= 1e6) return (n/1e6).toFixed(0) + 'M';
  return n.toLocaleString();
}
function durToSec(d){const [m,s]=d.split(':').map(Number);return m*60+s;}
function secToDur(sec){const m=Math.floor(sec/60);const s=Math.floor(sec%60);return m+':'+String(s).padStart(2,'0');}

/* gradient placeholder — swappable with real album art later */
function artGradient(genreId){
  const g = genreById(genreId);
  if(!g) return 'linear-gradient(135deg,#333,#555)';
  return `linear-gradient(135deg,${g.color},${g.colorSecondary})`;
}
function artHTML(song, extraClass=''){
  const g = genreById(song.genre);
  const cachedUrl = albumArtCache[song.id];
  const styleAttr = cachedUrl 
    ? `background-image: url('${cachedUrl}'); background-size: cover; background-position: center;` 
    : `background: ${artGradient(song.genre)};`;
  
  if (!cachedUrl) {
    fetchAndCacheAlbumArt(song);
  }
  
  return `<div class="art-thumb ${extraClass}" data-art-song-id="${song.id}" style="${styleAttr}">
    <span style="opacity:.55; ${cachedUrl ? 'display:none;' : ''}">${g?g.emoji:'●'}</span>
  </div>`;
}
function genreTagHTML(genreId){
  const g = genreById(genreId);
  if(!g) return '';
  return `<span class="genre-tag"><span class="gt-dot" style="background:${g.color}"></span>${t(g.nameKo,g.name)}</span>`;
}
const initials = name => name.split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
function avatarColor(name){
  let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
  return `hsl(0,0%,${25 + Math.abs(h)%35}%)`;
}

const routes = {
  '#home': renderHome, '#genres': renderGenres,
  '#search': renderSearch, '#timeline': renderTimeline, '#taste': renderTaste,
};
function handleRoute(){
  const hash = location.hash || '#home';
  const root = document.getElementById('view-root');
  root.scrollTop = 0;
  document.getElementById('main-content').scrollTop = 0;
  let view = hash;
  if(hash.startsWith('#genre/')){
    renderGenreDetail(hash.replace('#genre/',''));
    view = '#genres';
  } else if(hash.startsWith('#artist/')){
    renderArtistDetail(decodeURIComponent(hash.replace('#artist/','')));
    view = '';
  } else {
    (routes[hash] || renderHome)();
  }
  updateActiveNav(view);
}
window.addEventListener('hashchange', handleRoute);

function registerDynamicSong(iTunesSong) {
  const existing = SONGS.find(s => 
    s.title.toLowerCase() === iTunesSong.trackName.toLowerCase() && 
    s.artist.toLowerCase() === iTunesSong.artistName.toLowerCase()
  );
  if (existing) return existing;
  
  const newId = SONGS.length > 0 ? Math.max(...SONGS.map(s => s.id)) + 1 : 1;
  const newSong = {
    id: newId,
    rank: SONGS.length + 1,
    title: iTunesSong.trackName,
    artist: iTunesSong.artistName,
    genre: (iTunesSong.primaryGenreName || 'Pop').toLowerCase().replace(/[^a-z]/g, ''),
    year: iTunesSong.releaseDate ? new Date(iTunesSong.releaseDate).getFullYear() : 2020,
    popularity: 85,
    duration: secToDur(iTunesSong.trackTimeMillis / 1000),
    streamCount: 50000000 + (iTunesSong.trackId % 200000000),
    rankChange: 0,
    isDynamic: true,
    previewUrl: iTunesSong.previewUrl
  };
  
  albumArtCache[newSong.id] = iTunesSong.artworkUrl100.replace('100x100bb.jpg', '500x500bb.jpg');
  saveAlbumArtCache();
  
  SONGS.push(newSong);
  return newSong;
}

function fetchArtistSongsFromITunes(artistName) {
  const query = encodeURIComponent(artistName);
  fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=10`)
    .then(res => res.json())
    .then(data => {
      const listDiv = document.getElementById('artist-songs-list');
      if (!listDiv) return;
      
      if (data.results && data.results.length > 0) {
        const registeredSongs = data.results.map(registerDynamicSong);
        const songRowsHTML = registeredSongs.map((s, i) => `
          <div class="chart-row gd" onclick="playSong(${s.id})">
            <div class="cr-rankcell"><span class="cr-rank">${i+1}</span><button class="btn-play sm cr-playbtn" onclick="event.stopPropagation();playSong(${s.id})">${ICON.play}</button></div>
            <div class="cr-song">${artHTML(s)}<div style="min-width:0"><div class="cr-title">${esc(s.title)}</div><div class="cr-artist">${esc(s.artist)}</div></div></div>
            <div class="cr-num cr-year">${s.year}</div>
            <div class="cr-num">${fmtListeners(s.streamCount)}</div>
            <div class="cr-num">${s.duration}</div>
          </div>
        `).join('');
        
        listDiv.innerHTML = songRowsHTML;
      } else {
        listDiv.innerHTML = `<div class="empty-state"><div class="es-emoji">●</div>${t('곡을 찾지 못했습니다.','No tracks found.','曲が見つかりませんでした。')}</div>`;
      }
      applyLang();
    })
    .catch(err => {
      console.error("iTunes artist search failed:", err);
      const listDiv = document.getElementById('artist-songs-list');
      if (listDiv) {
        listDiv.innerHTML = `<div class="empty-state"><div class="es-emoji">✖</div>${t('곡 정보를 불러오는 데 실패했습니다.','Failed to load songs.','曲情報の読み込みに失敗しました。')}</div>`;

    });

function toggleTasteGenre(id){
  const idx = tasteState.genres.indexOf(id);
  if (idx > -1) {
    tasteState.genres.splice(idx, 1);
  } else {
    if (tasteState.genres.length < 3) {
      tasteState.genres.push(id);
    }
  }
  renderTaste();
}

function selectTasteVibe(id){
  tasteState.vibe = id;
  renderTaste();
}

function selectTasteEra(id){
  tasteState.era = id;
  renderTaste();
}

function selectTasteSoundFocus(id){
  tasteState.soundFocus = id;
  renderTaste();
}

function selectTasteHabitat(id){
  tasteState.habitat = id;
  renderTaste();
}

function nextTasteStep(){
  if (tasteState.step === 1 && tasteState.genres.length === 0) {
    alert(t('최소 1개의 장르를 선택해 주세요!','Please select at least 1 genre!','最低1つのジャンルを選択してください！'));
    return;
  }
  if (tasteState.step === 2 && !tasteState.vibe) {
    alert(t('음악 분위기를 선택해 주세요!','Please select a music vibe!','音楽の雰囲気を選択してください！'));
    return;
  }
  if (tasteState.step === 3 && !tasteState.era) {
    alert(t('선호하는 시대를 선택해 주세요!','Please select a preferred era!','好みの年代を選択してください！'));
    return;
  }
  if (tasteState.step === 4 && !tasteState.soundFocus) {
    alert(t('사운드 포커스를 선택해 주세요!','Please select a sound focus!','サウンドフォーカスを選択してください！'));
    return;
  }
  tasteState.step++;
  renderTaste();
}

function prevTasteStep(){
  tasteState.step--;
  renderTaste();
}

function calculateTasteDNA(){
  if (tasteState.step === 5 && !tasteState.habitat) {
    alert(t('음악을 듣는 공간을 선택해 주세요!','Please select a listening habitat!','음악을 듣는 공간을 선택해 주세요!'));
    return;
  }
  tasteState.step = 'result';
  renderTaste();
}

function resetTaste(){
  tasteState = { step: 1, genres: [], vibe: '', era: '', soundFocus: '', habitat: '' };
  renderTaste();
}

let npState = { song:null, playing:false, elapsed:0, total:0, timer:null, volume:0.2 };

function getVibeData(song) {
  const hash = (song.id * 17) % 100;
  let tempo = 120;
  let energy = 70 + (hash % 25);
  let mood = 50 + (hash % 41) - 20;
  let organic = 15 + (hash % 70);
  
  if (song.genre === 'pop') {
    tempo = 100 + (hash % 30);
    organic = Math.max(10, organic - 20);
  } else if (song.genre === 'hiphop') {
    tempo = 80 + (hash % 20);
    energy = Math.max(70, energy);
    organic = Math.max(15, organic - 15);
  } else if (song.genre === 'rock') {
    tempo = 115 + (hash % 30);
    energy = Math.max(75, energy);
    organic = Math.max(30, organic + 10);
  } else if (song.genre === 'metal') {
    tempo = 135 + (hash % 40);
    energy = Math.max(85, energy + 10);
    organic = Math.min(25, organic / 2);
  } else if (song.genre === 'electronic') {
    tempo = 120 + (hash % 20);
    organic = Math.min(20, organic / 3);
  } else if (song.genre === 'rnb') {
    tempo = 70 + (hash % 30);
    organic = Math.max(40, organic + 15);
    energy = Math.min(75, energy);
  } else if (song.genre === 'jazz') {
    tempo = 60 + (hash % 50);
    organic = Math.max(70, organic + 30);
    energy = Math.min(60, energy - 10);
  } else if (song.genre === 'classical') {
    tempo = 50 + (hash % 80);
    organic = 95;
    energy = Math.min(50, energy - 20);
  } else if (song.genre === 'kpop') {
    tempo = 110 + (hash % 30);
    organic = Math.max(10, organic - 20);
    energy = Math.max(80, energy);
  } else if (song.genre === 'indie') {
    tempo = 90 + (hash % 40);
    organic = Math.max(45, organic + 15);
  } else if (song.genre === 'jpop') {
    tempo = 115 + (hash % 35);
    organic = Math.max(25, organic + 5);
    energy = Math.max(70, energy);
  }
  
  tempo = Math.round(tempo);
  energy = Math.min(100, Math.max(0, Math.round(energy)));
  mood = Math.min(100, Math.max(0, Math.round(mood)));
  organic = Math.min(100, Math.max(0, Math.round(organic)));

  const g = genreById(song.genre);
  const genreName = g ? t(g.nameKo, g.name, g.nameJa) : song.genre;
  
  let analysisKo = `이 곡은 ${song.year}년에 발표된 ${song.artist}의 작품으로, ${genreName} 장르 특유의 예술적 기법과 고유한 사운드가 돋보입니다. 템포는 ${tempo} BPM으로 안정적이면서도 리드미컬한 긴장감을 유지하며, ${energy}%의 높은 에너지 레벨을 바탕으로 곡의 테마를 힘 있게 전달합니다. 특히 전자 악기와 어쿠스틱 사운드의 비율이 적절히 조화를 이루어, 이 장르를 선호하는 이들의 취향에 아주 잘 부합하는 명곡입니다.`;
  let analysisEn = `Released in ${song.year} by ${song.artist}, this track is a stellar representation of the ${song.genre.toUpperCase()} genre. Clocking in at ${tempo} BPM, it strikes an elegant balance between rhythm and emotional depth. With an energy rating of ${energy}%, it drives its musical theme forward with absolute confidence. The mix showcases a ${organic}% acoustic texture blended with genre-defining elements, offering a rich soundscape for curious ears.`;
  let analysisJa = `この曲は${song.year}年にリリースされた${song.artist}の作品で、${genreName}ジャンル特有の芸術的な手法と独自のサウンドが際立っています。テンポは${tempo} BPMで、安定しながらもリズミカルな緊張感を維持し、${energy}%の高いエネルギーレベルをベースに曲의テーマを力強く表現しています。特に電子楽器とアコースティックサウンドのバランスが絶妙に調和しており、このジャンルを好むリスナーの感性に完璧にフィットする名曲です。`;

  return { tempo, energy, mood, organic, analysisKo, analysisEn, analysisJa };
}

function playAudio(url) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  currentAudio = new Audio(url);
  currentAudio.volume = npState.volume;
  currentAudio.play().catch(err => {
    console.log("Audio playback failed (interaction required or invalid URL):", err);
  });
  
  currentAudio.addEventListener('timeupdate', () => {
    if (currentAudio && npState.playing && npState.song) {
      npState.elapsed = currentAudio.currentTime;
      npState.total = currentAudio.duration || durToSec(npState.song.duration);
      updateProgress();
    }
  });
  
  currentAudio.addEventListener('ended', () => {
    nextSong();
  });
}

function playSong(id){
  const song = SONGS.find(s=>s.id===id);
  if(!song) return;
  
  if (isShuffle) {
    if (shuffleQueue.length === 0) {
      initShuffleQueue();
    }
    const sIdx = shuffleQueue.findIndex(s => s.id === id);
    if (sIdx > -1) {
      shuffleIndex = sIdx;
    }
  }
  
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  
  npState.song = song;
  npState.total = durToSec(song.duration);
  npState.elapsed = 0;
  npState.playing = true;
  renderVibeAnalyzer();
  startTimer();
  
  const previewUrl = song.previewUrl || audioPreviewCache[song.id];
  if (previewUrl) {
    playAudio(previewUrl);
  } else {
    fetchAndCacheAlbumArt(song, true);
  }
}

let visualizerInterval = null;
let isShuffle = false;
let isRepeat = false;
let shuffleQueue = [];
let shuffleIndex = -1;

function initShuffleQueue() {
  shuffleQueue = [...SONGS].sort(() => 0.5 - Math.random());
  if (npState.song) {
    shuffleIndex = shuffleQueue.findIndex(s => s.id === npState.song.id);
  } else {
    shuffleIndex = 0;
  }
}

function startVisualizer() {
  stopVisualizer();
  if (!npState.playing || !npState.song) return;
  
  const barCount = 25;
  const s = npState.song;
  
  visualizerInterval = setInterval(() => {
    const wave = document.getElementById('va-wave');
    if (!wave) return;
    for (let i = 0; i < barCount; i++) {
      const bar = wave.querySelector(`.va-bar-${i}`);
      if (bar) {
        const baseH = 8 + Math.round(Math.abs(Math.sin((i / barCount) * Math.PI * 2) * 16)) + (s.id * i % 6);
        const randOffset = Math.sin(Date.now() / 150 + i) * 6 * Math.random();
        const h = Math.max(4, Math.min(32, baseH + randOffset));
        bar.setAttribute('height', h);
        bar.setAttribute('y', 16 - h / 2);
      }
    }
  }, 75);
}

function stopVisualizer() {
  if (visualizerInterval) {
    clearInterval(visualizerInterval);
    visualizerInterval = null;
  }
  const wave = document.getElementById('va-wave');
  if (wave && npState.song) {
    const barCount = 25;
    const s = npState.song;
    for (let i = 0; i < barCount; i++) {
      const bar = wave.querySelector(`.va-bar-${i}`);
      if (bar) {
        const h = 8 + Math.round(Math.abs(Math.sin((i / barCount) * Math.PI * 2) * 16)) + (s.id * i % 6);
        bar.setAttribute('height', h);
        bar.setAttribute('y', 16 - h / 2);
      }
    }
  }
}

  npState.volume = val / 100;
  if (currentAudio) {
    currentAudio.volume = npState.volume;
  }
}

function togglePlay(){
  if(!npState.song) return;
  npState.playing = !npState.playing;
  
  if(npState.playing) {
    if (currentAudio) {
      currentAudio.play().catch(err => console.log("Audio play failed:", err));
    } else {
      const previewUrl = npState.song.previewUrl || audioPreviewCache[npState.song.id];
      if (previewUrl) {
        playAudio(previewUrl);
      } else {
        fetchAndCacheAlbumArt(npState.song, true);
      }
    }
    startTimer();
  } else {
    if (currentAudio) {
      currentAudio.pause();
    }
    stopTimer();
  }
  
  const btn = document.getElementById('va-play-btn');
  if(btn) btn.innerHTML = npState.playing ? ICON.pause : ICON.play;
}

function startTimer(){
  stopTimer();
  npState.timer = setInterval(()=>{
    if (currentAudio) {
      if (currentAudio.ended) {
        nextSong();
      }
      return;
    }
    if(npState.elapsed >= npState.total){ nextSong(); return; }
    npState.elapsed++;
    updateProgress();
  }, 1000);
  startVisualizer();
}

function stopTimer(){ 
  if(npState.timer){ clearInterval(npState.timer); npState.timer=null; } 
  stopVisualizer();
}

function stepSong(dir){
  if(!npState.song) return;
  if(isRepeat && dir > 0) {
    playSong(npState.song.id);
    return;
  }
  if(isShuffle) {
    if (shuffleQueue.length === 0) {
      initShuffleQueue();
    }
    shuffleIndex = (shuffleIndex + dir + shuffleQueue.length) % shuffleQueue.length;
    const nextS = shuffleQueue[shuffleIndex];
    if (nextS) {
      playSong(nextS.id);
    }
    return;
  }
  const idx = SONGS.findIndex(s=>s.id===npState.song.id);
  const next = SONGS[(idx + dir + SONGS.length) % SONGS.length];
  playSong(next.id);
}
function nextSong(){ stepSong(1); }
function prevSong(){
  if(npState.elapsed > 3){ 
    npState.elapsed=0; 
    if (currentAudio) {
      currentAudio.currentTime = 0;
    }
    updateProgress(); 
    return; 
  }
  stepSong(-1);
}

function updateProgress(){
  const el = document.getElementById('va-elapsed');
  if(el) el.textContent = secToDur(npState.elapsed);
  
  const wave = document.getElementById('va-wave');
  if(wave){
    const pct = npState.elapsed / npState.total;
    const barCount = 25;
    const activeIndex = Math.floor(pct * barCount);
    for (let i = 0; i < barCount; i++) {
      const bar = wave.querySelector(`.va-bar-${i}`);
      if(bar){
        if (i <= activeIndex) {
          bar.setAttribute('fill', 'var(--accent-cyan)');
        } else {
          bar.setAttribute('fill', 'rgba(255, 255, 255, 0.15)');
        }
      }
    }
  }
}

function seekWave(e){
  const r = document.getElementById('va-wave').getBoundingClientRect();
  const targetSec = Math.round((e.clientX-r.left)/r.width*npState.total);
  npState.elapsed = targetSec;
  if (currentAudio) {
    currentAudio.currentTime = targetSec;
  }
  updateProgress();
}

document.getElementById('nav-back').onclick = ()=>history.back();
document.getElementById('nav-fwd').onclick = ()=>history.forward();
document.getElementById('main-content').addEventListener('scroll', e=>{
  document.getElementById('global-header').classList.toggle('scrolled', e.target.scrollTop > 12);
});
renderNav();
applyLang();
handleRoute();
</script>
