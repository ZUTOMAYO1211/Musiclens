<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicLens · 뮤직렌즈</title>
<link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
<!-- Ambient background blobs -->
<div class="ambient-bg">
  <div class="ambient-blob ab1"></div>
  <div class="ambient-blob ab2"></div>
  <div class="ambient-blob ab3"></div>
</div>

<div class="app-container">
  <header class="global-header" id="global-header">
    <div class="header-left">
      <a href="#home" class="nav-logo">
        <span class="logo-mark" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.2"/><circle cx="11" cy="11" r="2.4" fill="currentColor"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        </span>
        MusicLens
      </a>
      <div class="topbar-nav">
        <button id="nav-back" aria-label="back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button id="nav-fwd" aria-label="forward"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>
    
    <nav class="header-nav" id="header-nav"></nav>
    
    <div class="header-right">
      <a href="index.html" class="btn-outlined" data-ko="소개 페이지로" data-en="About MusicLens" data-ja="紹介ページへ" style="padding: 6px 12px; font-size: 11px; font-family: var(--font-mono); text-decoration: none; border-radius: 0; display: inline-flex; align-items: center; justify-content: center; height: 32px;">About MusicLens</a>
      <div class="lang-toggle">
        <button id="lang-ko" class="active" onclick="setLanguage('ko')">KO</button>
        <button id="lang-en" onclick="setLanguage('en')">EN</button>
        <button id="lang-ja" onclick="setLanguage('ja')">JA</button>
      </div>
    </div>
  </header>

  <main class="main-content" id="main-content">
    <div class="main-inner" id="view-root"></div>
  </main>
</div>

<!-- Vibe Analyzer slide-out drawer -->
<div class="vibe-analyzer" id="vibe-analyzer"></div>

<nav class="mobile-nav" id="mobile-nav"></nav>

<script src="./src/data/data.js"></script>
<script src="./src/scripts/app.js"></script>
</body>
</html>
